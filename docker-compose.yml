version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: receipt-analyzer-db
    environment:
      POSTGRES_DB: receipt_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - receipt-analyzer-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-analyzer-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/receipt_analyzer
      GROQ_API_KEY: ${GROQ_API_KEY}
      SAVED_PDF_FILES_PATH: /app/data/saved_pdf_files
      TEMP_PDF_FILES_PATH: /app/data/temp_pdf_files
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - receipt-analyzer-network
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-analyzer-ui
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/receipt_analyzer
      GROQ_API_KEY: ${GROQ_API_KEY}
      API_URL: http://app:8000
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    depends_on:
      - app
    networks:
      - receipt-analyzer-network
    command: streamlit run app/ui_layer/ui.py --server.port=8501 --server.address=0.0.0.0 --logger.level=debug

volumes:
  postgres_data:

networks:
  receipt-analyzer-network:
    driver: bridge
